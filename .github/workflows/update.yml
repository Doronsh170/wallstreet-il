name: Update Wall Street IL

on:
  workflow_dispatch:
    inputs:
      review_type:
        description: 'Review type to generate'
        required: true
        default: 'daily_prep'
        type: choice
        options:
          - daily_prep
          - daily_summary
          - weekly_prep
          - weekly_summary
          - events
          - live_news

concurrency:
  group: wallstreet-il-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Debug before update
        shell: bash
        run: |
          echo "Review type: ${{ github.event.inputs.review_type }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Working directory: $(pwd)"
          echo "Files at root:"
          ls -la
          echo "Scripts folder:"
          ls -la scripts || true
          echo "Workflow file exists:"
          ls -la .github/workflows || true
          echo "First lines of scripts/update_data.py:"
          head -40 scripts/update_data.py || true
          echo "Current data.json status:"
          python - <<'PY'
          import json
          try:
              with open('data.json', encoding='utf-8') as f:
                  d=json.load(f)
              print('lastUpdated:', d.get('lastUpdated'))
              print('dailyPrep.date:', d.get('dailyPrep',{}).get('date'))
              print('dailySummary.date:', d.get('dailySummary',{}).get('date'))
              print('weeklyPrep.date:', d.get('weeklyPrep',{}).get('date'))
              print('weeklySummary.date:', d.get('weeklySummary',{}).get('date'))
              print('liveNews.date:', d.get('liveNews',{}).get('date'))
          except Exception as e:
              print('Cannot read data.json as JSON:', repr(e))
              raise
          PY
          cp data.json /tmp/data.before.json
          sha256sum data.json /tmp/data.before.json

      - name: Run update script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          REVIEW_TYPE: ${{ github.event.inputs.review_type }}
        run: python scripts/update_data.py

      - name: Verify update result
        shell: bash
        run: |
          echo "After update data.json status:"
          sha256sum data.json /tmp/data.before.json
          python - <<'PY'
          import json

          review_type='${{ github.event.inputs.review_type }}'
          key_map={
              'daily_prep':'dailyPrep',
              'daily_summary':'dailySummary',
              'weekly_prep':'weeklyPrep',
              'weekly_summary':'weeklySummary',
              'events':'events',
              'live_news':'liveNews',
          }
          with open('data.json', encoding='utf-8') as f:
              d=json.load(f)
          print('lastUpdated:', d.get('lastUpdated'))
          for k in ['dailyPrep','dailySummary','weeklyPrep','weeklySummary','liveNews']:
              print(f'{k}.date:', d.get(k,{}).get('date'))
          if review_type in key_map:
              section=d.get(key_map[review_type], {})
              print('selected section:', key_map[review_type])
              print('selected title:', section.get('title'))
              print('selected date:', section.get('date') or section.get('lastUpdated'))
          before=open('/tmp/data.before.json','rb').read()
          after=open('data.json','rb').read()
          if before == after:
              raise SystemExit('ERROR: update_data.py finished, but data.json is byte-for-byte unchanged. The script did not update the site data.')
          PY

      - name: Commit and push changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          echo "Git status after git add:"
          git status --short
          echo "Data diff preview:"
          git diff --staged -- data.json | head -200 || true
          if git diff --staged --quiet; then
            echo "::error::No changes to commit. data.json did not change, so GitHub Pages will keep showing the old review."
            exit 1
          fi
          git commit -m "Update ${{ github.event.inputs.review_type }} - $(date -u +%Y-%m-%dT%H:%M:%S)"
          git pull --rebase origin main || { echo "Rebase conflict — data already updated by another run, skipping."; git rebase --abort; exit 0; }
          git push
