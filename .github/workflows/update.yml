name: Update Wall Street IL

on:
  workflow_dispatch:
    inputs:
      review_type:
        description: 'Review type to generate'
        required: true
        default: 'daily_prep'
        type: choice
        options:
          - daily_prep
          - daily_summary
          - weekly_prep
          - weekly_summary
          - events
          - live_news

concurrency:
  group: wallstreet-il-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Optional. Defaults are defined in scripts/update_data.py.
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_FAST_MODEL: ${{ secrets.OPENAI_FAST_MODEL }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          REVIEW_TYPE: ${{ github.event.inputs.review_type }}
        run: python scripts/update_data.py

      - name: Commit and push changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update ${{ github.event.inputs.review_type }} - $(date -u +%Y-%m-%dT%H:%M:%S)"
          git pull --rebase origin main || { echo "Rebase conflict — data already updated by another run, skipping."; git rebase --abort; exit 0; }
          git push
